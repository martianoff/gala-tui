name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# We track gala master rather than a published release because gala-tui
# exercises several language-edge cases (cross-pkg sealed-case generic
# inference, cross-pkg dot-import collision detection) whose fixes are
# typically merged to master well before the next release tag. Pin to a
# specific gala commit when reproducibility matters.
env:
  GALA_REF: master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build GALA CLI from source
        run: |
          git clone --depth 1 --branch "${GALA_REF}" https://github.com/martianoff/gala.git /tmp/gala
          cd /tmp/gala
          go build -o /usr/local/bin/gala ./cmd/gala
          gala version

      - name: Test
        run: gala test
